manifest:
  remotes:
    - name: urob
      url-base: https://github.com/urob

    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware

    - name: carrefinho
      url-base: https://github.com/carrefinho

    - name: m165437
      url-base: https://github.com/m165437

    - name: badjeff
      url-base: https://github.com/badjeff

  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml

    - name: zmk-adaptive-key
      path: modules/zmk-adaptive-key
      remote: urob
      revision: main
    - name: zmk-auto-layer
      path: modules/zmk-auto-layer
      remote: urob
      revision: main
    - name: zmk-helpers
      path: modules/zmk-helpers
      remote: urob
      revision: main
    - name: zmk-leader-key
      path: modules/zmk-leader-key
      remote: urob
      revision: main
    - name: zmk-tri-state
      path: modules/zmk-tri-state
      remote: urob
      revision: main
    - name: zmk-unicode
      path: modules/zmk-unicode
      remote: urob
      revision: main

    - name: prospector-zmk-module
      remote: carrefinho
      revision: feat/new-status-screens

    - name: nice-view-gem
      remote: m165437
      revision: main

    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: main

  self:
    path: config
